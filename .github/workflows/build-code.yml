name: Check VS Code Updates

on:
  schedule:
    # Every Wednesday at 12:00 UTC
    - cron: "0 12 * * 3"
  workflow_dispatch:

concurrency:
  group: vscode-update
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check for new VS Code release
        id: check
        shell: bash
        run: |
          set -euo pipefail

          LATEST=$(curl -fsSL https://update.code.visualstudio.com/api/releases/stable | jq -r '.[0]')
          CURRENT=$(grep '^pkgver=' code/PKGBUILD | cut -d= -f2)

          echo "Latest:  $LATEST"
          echo "Current: $CURRENT"

          if [[ "$LATEST" == "$CURRENT" ]]; then
          echo "update_needed=false" >> "$GITHUB_OUTPUT"
          exit 0
          fi

          TARBALL_URL="https://update.code.visualstudio.com/${LATEST}/linux-x64/stable"
          echo "Verifying tarball availability at $TARBALL_URL..."
          HTTP_CODE=$(curl -sSL -o /dev/null -w "%{http_code}" -I "$TARBALL_URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
          echo "::notice::Tarball not yet available (HTTP $HTTP_CODE). Skipping this run."
          echo "update_needed=false" >> "$GITHUB_OUTPUT"
          exit 0
          fi

          echo "update_needed=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        if: steps.check.outputs.update_needed == 'true'
        run: |
          set -euo pipefail

          sed -i "s/^pkgver=.*/pkgver=${{ steps.check.outputs.new_version }}/" code/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" code/PKGBUILD

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/vscode-${{ steps.check.outputs.new_version }}
          title: "code: update to ${{ steps.check.outputs.new_version }}"
          commit-message: "code: update to ${{ steps.check.outputs.new_version }}"
          body: |
            Automated VS Code package update.

            ## Changes
            - Bump `pkgver` to `${{ steps.check.outputs.new_version }}`
            - Reset `pkgrel` to `1`

            Merge this PR to trigger the build and publish workflow.
          delete-branch: true
